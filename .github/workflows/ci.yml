# CI for the Sprint Capacity Planner YouTrack app.
#
#  build-and-test  (every push/PR): install → lint → typecheck → unit → contract → build →
#                   pack, then publish the app ZIP as an artifact.
#  demos           (push to main + manual): bring up a REAL YouTrack in Docker, install +
#                   seed the app, and RECORD the two demo reels headed under a virtual display
#                   (Xvfb) inside the Playwright Docker image. Real YouTrack only — never a
#                   stub (project rule). Reels + report are uploaded as artifacts.
#  security-review (every push/PR): placeholder hooks for the security/code-review tooling.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      record_demos:
        description: 'Record the demo reels (real YouTrack in Docker)'
        type: boolean
        default: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Lint / Typecheck / Unit / Contract / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (all)
        run: npm run typecheck:all
      - name: Unit tests
        run: npm run test:unit
      - name: Contract tests
        run: npm run test:contract
      - name: Build app package
        run: npm run build
      - name: Pack app ZIP
        run: npm run pack
      - name: Upload app package
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: dist/sprint-capacity-planner.zip
          retention-days: 30

  # Record the reels against a REAL YouTrack (project rule: never a stub). YouTrack runs in
  # Docker and is configured headlessly; the reels are recorded headed under Xvfb inside the
  # Playwright Docker image. Heavy (~pulls YouTrack + Playwright images, boots YouTrack), so it
  # runs on pushes to main and manual dispatch rather than every PR.
  demos:
    name: Record demo reels (real YouTrack in Docker)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.record_demos) }}
    timeout-minutes: 45
    env:
      YT_TEST_BASE_URL: http://localhost:8080
      YT_TEST_MANAGER_LOGIN: admin
      YT_TEST_MANAGER_PASSWORD: adminPass123!
      # setup/seed operate on the disposable CI instance.
      YT_TEST_ALLOW_DESTRUCTIVE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install ffmpeg + Playwright Chromium
        # ffmpeg: reel voiceover/analysis on the runner. Chromium: install-app-youtrack uploads
        # the ZIP through the admin UI (the REST upload rejects multipart), so it needs a browser.
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          npx playwright install --with-deps chromium
      - name: Start + configure YouTrack (Docker, headless wizard)
        run: node scripts/ci-youtrack-docker.mjs
      - name: Build, install app + seed the prepared demo state
        run: npm run demo:provision
      - name: Record the two reels (Docker + Xvfb)
        run: npm run demo:record:docker
      - name: Upload demo reels + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-reels
          path: artifacts/demo
          retention-days: 30
      - name: YouTrack logs (on failure)
        if: failure()
        run: docker logs youtrack-ci 2>&1 | tail -200 || true
      - name: Teardown YouTrack
        if: always()
        run: docker rm -f youtrack-ci || true

  security-and-review:
    name: Security + Code Review (placeholders)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Security review (placeholder)
        run: echo "SPIKE: wire security scanner / security-review plugin here."
      - name: Automated code review (placeholder)
        run: echo "SPIKE: wire the code-review plugin here."
